{{ define "main" }}
<div class="wrapper" style="height: 200px;">
    <div style="text-align: center; position: absolute;">
        <div class="typing-demo">The Archive at the End of the WWW...</div>
    </div>
    <img style="border-radius: 7px;" src="home.jpg" width = 568px; height = auto; alt="My Home Image">
</div>
<div style=”float:left”>
    <h3>{{ i18n "posts.title" }}</h3>
    <ul id="posts">
    {{- range where site.RegularPages "Type" "in" site.Params.mainSections }}
        {{ .Render "li" }}
    {{- end }}
    </ul>
</div>    
<!-- {{- partial "posts.html" . -}} --> 
{{ end }}
